<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GetNote WeChat Story</title>
  <style>
    :root {
      --orange: #ff6a00;
      --orange-soft: #fff0e6;
      --ink: #151515;
      --muted: #666;
      --paper: #fffaf5;
      --line: rgba(21,21,21,.12);
      --steel: #39424e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ece7df;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
    }
    #deck {
      display: grid;
      gap: 28px;
      padding: 28px;
      justify-content: center;
    }
    .wechat-slide {
      width: 1080px;
      height: 1440px;
      position: relative;
      overflow: hidden;
      background: var(--paper);
      border-radius: 0;
      padding: 86px 76px;
      display: grid;
      align-content: space-between;
      isolation: isolate;
    }
    .wechat-cover {
      width: 2100px;
      height: 900px;
      padding: 74px 96px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.68), rgba(0,0,0,.12)),
        var(--cover-image, linear-gradient(135deg, #222, #555));
      background-size: cover;
      background-position: center;
      color: #fff;
    }
    .wechat-slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 82% 12%, rgba(255,106,0,.18), transparent 34%),
        linear-gradient(135deg, rgba(255,106,0,.08), transparent 44%);
      z-index: -1;
    }
    .kicker {
      font-size: 30px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--orange);
      font-weight: 800;
      margin-bottom: 24px;
    }
    h1, h2, p { margin: 0; }
    .title {
      font-size: 82px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
      max-width: 880px;
    }
    .cover-title {
      font-size: 96px;
      line-height: 1.05;
      font-weight: 900;
      max-width: 980px;
      text-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    .body {
      font-size: 42px;
      line-height: 1.52;
      color: #303030;
      max-width: 880px;
    }
    .cover-body {
      font-size: 38px;
      line-height: 1.45;
      max-width: 820px;
      color: rgba(255,255,255,.88);
      margin-top: 32px;
    }
    .mono {
      font-family: "SFMono-Regular", Consolas, Menlo, monospace;
      color: var(--orange);
      background: rgba(255,106,0,.1);
      padding: .05em .22em;
      border-radius: 8px;
    }
    .panel {
      border: 3px solid var(--line);
      background: rgba(255,255,255,.62);
      padding: 42px;
      display: grid;
      gap: 22px;
    }
    .dark {
      background: #15181c;
      color: #fff;
    }
    .dark .body, .dark .note { color: rgba(255,255,255,.78); }
    .dark .panel {
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.18);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: stretch; }
    .stat {
      font-size: 132px;
      line-height: .9;
      color: var(--orange);
      font-weight: 950;
    }
    .label {
      font-size: 30px;
      line-height: 1.35;
      color: var(--muted);
    }
    .dark .label { color: rgba(255,255,255,.6); }
    .steps { display: grid; gap: 24px; }
    .step {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 24px;
      align-items: start;
      padding: 28px;
      border: 2px solid var(--line);
      background: rgba(255,255,255,.58);
    }
    .step-nb {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--orange);
      color: #fff;
      font-size: 30px;
      font-weight: 900;
    }
    .step-title { font-size: 38px; font-weight: 850; line-height: 1.2; }
    .step-desc { margin-top: 10px; font-size: 30px; line-height: 1.4; color: var(--muted); }
    .quote {
      font-size: 74px;
      line-height: 1.18;
      font-weight: 900;
      border-left: 14px solid var(--orange);
      padding-left: 38px;
    }
    .image-frame {
      width: 100%;
      min-height: 380px;
      background: var(--orange-soft);
      border: 3px solid var(--line);
      overflow: hidden;
    }
    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .note {
      font-size: 28px;
      line-height: 1.45;
      color: var(--muted);
    }
    .foot {
      position: absolute;
      left: 76px;
      right: 76px;
      bottom: 144px;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      font-size: 24px;
      color: var(--muted);
      border-top: 2px solid var(--line);
      padding-top: 24px;
    }
    .dark .foot { color: rgba(255,255,255,.55); border-color: rgba(255,255,255,.16); }
    .accent-bar {
      width: 160px;
      height: 16px;
      background: var(--orange);
      margin: 32px 0;
    }
    @media screen and (max-width: 900px) {
      #deck { transform: scale(.32); transform-origin: top center; }
    }
  </style>
</head>
<body>
  <main id="deck">
    <section class="wechat-cover" style="--cover-image:url('images/00-cover.jpg')">
      <div>
        <div class="kicker">AI TOOL RADAR</div>
        <h1 class="cover-title">断网以后，终端还能回答吗？</h1>
        <p class="cover-body">RK3588 + RKLLM 的端侧推理落地笔记。</p>
      </div>
    </section>

    <section class="wechat-slide">
      <div>
        <div class="kicker">01 / Problem</div>
        <h2 class="title">云不在，现场还在</h2>
        <div class="accent-bar"></div>
        <p class="body">矿井、石化园区、应急现场，不稳定的不是人和设备，而是网络。</p>
      </div>
      <div class="foot"><span>GetNote WeChat Story</span><span>01</span></div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const slide = params.get("slide");
    if (slide !== null) {
      const cards = [...document.querySelectorAll(".wechat-cover,.wechat-slide")];
      cards.forEach((card, index) => {
        card.style.display = String(index) === slide ? "grid" : "none";
      });
      document.body.style.background = "transparent";
      document.getElementById("deck").style.padding = "0";
      document.getElementById("deck").style.gap = "0";
    }
  </script>
</body>
</html>
